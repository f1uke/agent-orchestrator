components:
  schemas:
    APIError:
      properties:
        code:
          type: string
        details:
          additionalProperties: {}
          type: object
        error:
          type: string
        message:
          type: string
        requestId:
          type: string
      required:
      - error
      - code
      - message
      type: object
    AddProjectInput:
      properties:
        asWorkspace:
          type: boolean
        config:
          $ref: '#/components/schemas/ProjectConfig'
        name:
          type:
          - "null"
          - string
        path:
          type: string
        projectId:
          type:
          - "null"
          - string
      required:
      - path
      type: object
    AdfAttrs:
      properties:
        color:
          type: string
        filename:
          type: string
        language:
          type: string
        layout:
          type: string
        level:
          type: integer
        panelType:
          type: string
        state:
          type: string
        text:
          type: string
        url:
          type: string
      type: object
    AdfMark:
      properties:
        href:
          type: string
        type:
          type: string
      required:
      - type
      type: object
    AdfNode:
      properties:
        attrs:
          $ref: '#/components/schemas/AdfAttrs'
        content:
          items:
            $ref: '#/components/schemas/AdfNode'
          type: array
        marks:
          items:
            $ref: '#/components/schemas/AdfMark'
          type: array
        text:
          type: string
        type:
          type: string
      required:
      - type
      type: object
    AgentConfig:
      properties:
        model:
          type: string
        permissions:
          type: string
      type: object
    AgentInfo:
      properties:
        authStatus:
          description: Advisory local auth probe result. authorized means a recent
            local probe passed; spawn remains the authoritative validation point.
          enum:
          - authorized
          - unauthorized
          - unknown
          type: string
        id:
          type: string
        label:
          type: string
        models:
          description: Selectable model tiers for this agent. Empty means no tier
            choice; the agent's default model is used.
          items:
            $ref: '#/components/schemas/ModelInfo'
          type: array
      required:
      - id
      - label
      type: object
    ApprovalRule:
      properties:
        enabled:
          type: boolean
        threshold:
          type: integer
      type: object
    AuthorSmokeChecksInput:
      properties:
        cases:
          description: The full 3–6 case checklist.
          items:
            $ref: '#/components/schemas/SmokeAuthoredCaseInput'
          type: array
      required:
      - cases
      type: object
    AutoNudgeSettingsResponse:
      properties:
        enabled:
          type: boolean
      required:
      - enabled
      type: object
    ClaimPRRequest:
      properties:
        allowTakeover:
          type:
          - "null"
          - boolean
        pr:
          minLength: 1
          type: string
      required:
      - pr
      type: object
    ClaimPRResponse:
      properties:
        branchChanged:
          type: boolean
        ok:
          type: boolean
        prs:
          items:
            $ref: '#/components/schemas/SessionPRFacts'
          type: array
        sessionId:
          type: string
        takenOverFrom:
          items:
            type: string
          type: array
      required:
      - ok
      - sessionId
      - prs
      - branchChanged
      - takenOverFrom
      type: object
    CleanupSessionsResponse:
      properties:
        cleaned:
          items:
            type: string
          type: array
        ok:
          type: boolean
        skipped:
          items:
            $ref: '#/components/schemas/CleanupSkippedSession'
          type: array
      required:
      - ok
      - cleaned
      - skipped
      type: object
    CleanupSkippedSession:
      properties:
        reason:
          type: string
        sessionId:
          type: string
      required:
      - sessionId
      - reason
      type: object
    ControllersDaemonLoop:
      properties:
        description:
          type: string
        displayName:
          type: string
        intervalMs:
          format: int64
          type: integer
        lastRunAt:
          format: date-time
          type:
          - "null"
          - string
        name:
          type: string
        nextRunAt:
          format: date-time
          type:
          - "null"
          - string
        running:
          type: boolean
      required:
      - name
      - displayName
      - description
      - intervalMs
      - running
      type: object
    ControllersListDaemonLoopsResponse:
      properties:
        loops:
          items:
            $ref: '#/components/schemas/ControllersDaemonLoop'
          type: array
      required:
      - loops
      type: object
    ControllersResetReviewResponse:
      properties:
        failed:
          description: Number of stuck running review runs that were failed.
          format: int64
          type: integer
      required:
      - failed
      type: object
    ControllersSessionView:
      properties:
        activity:
          $ref: '#/components/schemas/DomainActivity'
        autoNameBranch:
          type: boolean
        autoNudgeComments:
          type:
          - "null"
          - boolean
        autoResolveOnReply:
          type:
          - "null"
          - boolean
        baseBranch:
          type: string
        branch:
          type: string
        createdAt:
          format: date-time
          type: string
        createdBy:
          type: string
        displayName:
          type: string
        harness:
          type: string
        id:
          type: string
        idleCloseAt:
          format: date-time
          type:
          - "null"
          - string
        isSuspended:
          type: boolean
        isTerminated:
          type: boolean
        isTodo:
          type: boolean
        issueId:
          type: string
        keepWarmOnMerge:
          type: boolean
        kind:
          type: string
        nextTransitionAt:
          format: date-time
          type:
          - "null"
          - string
        nextTransitionTo:
          enum:
          - todo
          - working
